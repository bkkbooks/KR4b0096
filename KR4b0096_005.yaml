body:
  text: 附録阮籍四言詩十首阮籍四言詩十首陽精炎赫卉木蕭森谷風扇暑密雲重陰激電震光迅雷遺音零雨降集飄溢北林泛泛輕舟載浮載沉感往悼來懷古傷今生年有命時過慮深何用寫思嘯歌長吟誰能秉志如玉如金處哀不傷在樂不淫恭承明訓以慰我心立象昭回陰陽攸經秋風夙厲白露宵零修林雕殞茂草收榮良時忽邁朝日西傾有始有終誰能久盈太微開塗三辰垂精峨峨群龍躍奮紫庭鱗分委瘁時高路清爰潛爰默韜影隱形願保今日永符修齡璣衡運速四節佚宣冬日悽悕玄雲蔽天素冰彌澤白雪依山逝往譬彼流川人誰不設貴使名全大道夷敞蹊徑爭先玄黃塵垢紅紫光鮮嗟我孔父聖懿通玄非義之榮忽若塵煙雖無靈德願潛于淵朝雲四集日夕布散素景垂光明星有爛肅肅翔鸞雍雍鳴雁今我不樂歲月其晏姜叟毗周子房翼漢應期佐命庸勳靜亂身用功顯德以名讚世無曩事器非時幹委命有承天無怨嗟爾君子胡為永歎日月隆光克鑒天聰三后臨朝三八登庸升我俊髦黜彼頑凶太上立德其次立功仁風廣被玄化潛通幸遭盛明覩此時雍棲遲衡門唯志所從出處殊塗俯仰異容瞻歎古烈思邁高蹤嘉此箕山忽彼虞龍登高望遠周覽八隅山川悠邈長路乖殊感彼墨子懷此楊朱抱影鵠立企首踟蹰仰瞻翔鳥俯視游魚丹林雲霏緑葉風舒造化絪縕萬物紛敷大則不足約則有餘何用養志守以沖虛猶願異世萬載同符微微我徒秩秩大猷研精典素思心淹留乃命僕夫興言出游浩浩洪川泛泛楊舟仰瞻景曜俯視波流日月東遷景曜西幽寒往暑來四節代周繁華茂春密葉殞秋盛年衰邁忽焉若浮逍遙逸豫與世無尤我徂北林遊彼河濱仰攀瑤幹俯視素綸隱鳳棲翼潛龍躍鱗幽光韜影體化應神君子邁德處約思純貨殖招譏簞瓢稱仁夷叔採薇清高遠震齊景千駟為此埃塵嗟爾後進茂茲人倫蓽門圭竇謂之道真華容艷色曠世特彰妖冶殊麗婉若清揚鬒髮娥眉綿邈流光藻采綺靡從風遺芳回首悟精魂射飛揚君子克己心潔冰霜泯泯亂昏在昔二王瑤臺璇室長夜金梁殷氏放夏周翦紂商於戲後昆可為悲傷晨風掃塵朝雨灑路飛駟龍騰哀鳴外顧攬轡按策進退有度樂往哀來悵然心悟念彼恭人眷眷懷顧日月運往歲聿云暮嗟余幼人既頑且固豈不志遠才難企慕命非金石身輕朝露焉知松喬頤神太素逍遙區外登我年祚詩天地烟熅元精代序清陽曜靈和氣容與於赫帝朝伊衡作輔才非允文器非經武適彼沅湘託介漁父優哉游哉爰居爰處月明星稀天高氣寒嘯歌傷懷獨寤寐言臨觴撫膺對食忘餐世無萱草令我哀歎太平御覽卷一引阮籍詩太平御覽卷一引阮籍詩焉得喬松頤神太素逍遙區外登我年祚
