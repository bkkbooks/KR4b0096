body:
  text: 卷一其一詠懷詩三首天地絪縕元精代序清陽曜靈和風容與明日映天甘露被宇蓊鬱高松猗那長楚草蟲哀鳴鶬鶊振羽感時興思企首延佇於赫帝朝伊衡作輔才非允文器非經武適彼沅湘託分漁父優哉游哉爰居爰處其二月明星稀天高氣寒桂旗翠旌珮玉鳴鸞濯纓醴泉被服蕙蘭思從二女適彼湘沅靈幽聽微誰觀玉顏灼灼春華綠葉含丹日月逝矣惜爾華繁其三清風肅肅脩夜漫漫嘯歌傷懷獨寐寤言臨觴拊膺對食忘餐世無萱草令我哀歎鳴鳥求友谷風刺愆重華登庸帝命凱元鮑子傾蓋仲父佐桓回濱嗟虞敢不希顏志存明規匪慕彈冠我心伊何其芳若蘭其一詠懷八十二首夜中不能寐起坐彈鳴琴薄帷鑒明月清風吹我襟孤鴻號外野翔鳥鳴北林徘徊將何見憂思獨傷心其二二妃遊江濱逍遙從風翔交甫解佩環婉孌有芬芳猗靡情歡愛千載不相忘傾城迷下蔡容好結中腸感激生憂思萱草樹蘭房膏沐為誰施其雨怨朝陽如何金石交一旦更離傷其三嘉樹下成蹊東園桃與李秋風吹飛藿零落從此始繁華有憔悴堂上生荊杞驅馬舍之去去上西山趾一身不自保何況戀妻子凝霜被野草歲暮亦云已其四天馬出西北由來從東道春秋非有託富貴焉常保清露被皋蘭凝霜霑野草朝為媚少年夕暮成醜老自非王子晉誰能常美好其五平生少年時輕薄好絃歌西遊咸陽中趙李相經過娛樂未終極白日忽蹉跎驅馬復來歸反顧望三河黃金百鎰盡資用常苦多北臨太行道失路將如何其六昔聞東陵瓜近在青門外連畛距阡陌子母相鉤帶五色曜朝日嘉賓四面會膏火自煎熬多財為患害布衣可終身寵祿豈足賴其七炎暑惟茲夏三旬將欲移芳樹垂綠葉青雲自逶迤四時更代謝日月遞參差徘徊空堂上忉怛莫我知願覩卒歡好不見悲別離其八灼灼西隤日餘光照我衣迴風吹四壁寒鳥相因依周周尚銜羽蛩蛩亦念飢如何當路子磬折忘所歸豈為夸譽名憔悴使心悲寧與燕雀翔不隨黃鵠飛黃鵠遊四海中路將安歸其九步出上東門北望首陽岑下有采薇士上有嘉樹林良辰在何許凝霜霑衣襟寒風振山岡玄雲起重陰鳴雁飛南征鶗鴂發哀音素質游商聲悽愴傷我心其十北里多奇舞濮上有微音輕薄閒游子俯仰乍浮沈捷徑從狹路僶俛趨荒淫焉見王子喬乘雲翔鄧林獨有延年術可以慰我心其十一湛湛長江水上有楓樹林皋蘭被徑路青驪逝駸駸遠望令人悲春氣感我心三楚多秀士朝雲進荒淫朱華振芬芳高蔡相追尋一為黃雀哀淚下誰能禁其十二昔日繁華子安陵與龍陽夭夭桃李花灼灼有輝光悅懌若九春磬折似秋霜流盻發姿媚言笑吐芬芳攜手等歡愛夙昔同衾裳願為雙飛鳥比翼共翱翔丹青著明誓永世不相忘其十三登高臨四野北望青山阿松柏翳岡岑飛鳥鳴相過感慨懷辛酸怨毒常苦多李公悲東門蘇子狹三河求仁自得仁豈復歎咨嗟其十四開秋兆涼氣蟋蟀鳴床帷感物懷殷憂悄悄令心悲多言焉所告繁辭將訴誰微風吹羅袂明月耀清暉晨雞鳴高樹命駕起旋歸其十五昔年十四五志尚好書詩被褐懷珠玉顏閔相與期開軒臨四野登高望所思丘墓蔽山岡萬代同一時千秋萬歲後榮名安所之乃悟羡門子噭噭令自嗤其十六徘徊蓬池上還顧望大梁綠水揚洪波曠野莽茫茫走獸交橫馳飛鳥相隨翔是時鶉火中日月正相望朔風厲嚴寒陰氣下微霜羈旅無儔匹俯仰懷哀傷小人計其功君子道其常豈惜終憔悴詠言著斯章其十七獨坐空堂上誰可與歡者出門臨永路不見行車馬登高望九州悠悠分曠野孤鳥西北飛離獸東南下日暮思親友晤言用自寫其十八懸車在西南羲和將欲傾流光耀四海忽忽至夕冥朝為咸池暉濛汜受其榮豈知窮達士一死不再生視彼桃李花誰能久熒熒君子在何許歎息未合并瞻仰景山松可以慰吾情其十九西方有佳人皎若白日光被服纖羅衣左右珮雙璜脩容耀姿美順風振微芳登高眺所思舉袂當朝陽寄顏雲霄閒揮袖凌虛翔飄颻恍惚中流眄顧我傍悅懌未交接晤言用感傷其二十楊朱泣歧路墨子悲染絲揖讓長離別飄颻難與期豈徒燕婉情存亡誠有之蕭索人所悲禍釁不可辭趙女媚中山謙柔愈見欺嗟嗟塗上士何用自保持其二十一於心懷寸陰羲陽將欲冥揮袂撫長劍仰觀浮雲征雲間有玄鶴抗志揚哀聲一飛沖青天曠世不再鳴豈與鶉鷃遊連翩戲中庭其二十二夏后乘雲輿夸父為鄧林存亡從變化日月有浮沉鳳皇鳴參差伶倫發其音王子好簫管世世相追尋誰言不可見青鳥明我心其二十三東南有射山汾水出其陽六龍服氣輿雲蓋切天綱仙者四五人逍遙晏蘭房寢息一純和呼噏成露霜沐浴丹淵中炤燿日月光豈安通靈臺游瀁去高翔其二十四殷憂令志結怵愓常若驚逍遙未終晏朱陽忽西傾蟋蟀在戶牗蟪蛄鳴中庭心腸未相好誰云亮我情願為雲間鳥千里一哀鳴三芝延瀛洲遠遊可長生其二十五拔劍臨白刃安能相中傷但畏工言子稱我三江旁飛泉流玉山懸車棲扶桑日月徑千里素風發微霜勢路有窮達咨嗟安可長其二十六朝登洪坡顛日夕望西山荊棘被原野群鳥飛翩翩鸞鷖時棲宿性命有自然建木誰能近射干復嬋娟不見林中葛延蔓相勾連其二十七周鄭天下交街術當三河妖冶閒都子煥燿何芬葩玄髮發朱顏睇眄有光華傾城思一顧遺視來相誇願為三春遊朝陽忽蹉跎盛衰在須臾離別將如何其二十八若花燿四海扶桑翳瀛洲日月經天塗明暗不相讎嚴達自有常得失又何求豈效路上童攜手共遨遊陰陽有變化誰云沈不浮朱鱉躍飛泉夜飛過吳洲俛仰運天地再撫四海流繫累名利場駑駿同一輈豈若遺耳目升遐去殷憂其二十九昔余遊大梁登于黃華顛共工宅玄冥高臺造青天幽荒邈悠悠悽愴懷所憐所憐者誰子明察自照妍應龍沈冀州妖女不得眠肆侈陵世俗豈云永厥年其三十驅車出門去意欲遠征行征行安所如背棄夸與名夸名不在己但願適中情單帷蔽皎日高榭隔微聲讒邪使交疏浮雲令晝冥嬿婉同衣裳一顧傾人城從容在一時繁華不再榮晨朝奄復暮不見所歡形黃鳥東南飛寄言謝友生其三十一駕言發魏都南向望吹臺簫管有遺音梁王安在哉戰士食糟糠賢者處蒿萊歌舞曲未終秦兵已復來夾林非吾有朱宮生塵埃軍敗華陽下身竟為土灰其三十二朝陽不再盛白日忽西幽去此若俯仰如何似九秋人生若塵露天道邈悠悠齊景升丘山涕泗紛交流孔聖臨長川惜逝忽若浮去者余不及來者吾不留願登太華山上與松子遊漁父知世患乘流泛輕舟其三十三一日復一夕一夕復一朝顏色改平常精神自損消胸中懷湯火變化故相招萬事無窮極知謀苦不饒但恐須臾間魂氣隨風飄終身履薄冰誰知我心焦其三十四一日復一朝一昏復一晨容色改平常精神自飄淪臨觴多哀楚思我故時人對酒不能言悽愴懷酸辛願耕東皋陽誰與守其真愁苦在一時高行傷微身曲直何所為龍蛇為我鄰其三十五世務何繽紛人道苦不遑壯年以時逝朝露待太陽願攬羲和轡白日不移光天階路殊絕雲漢邈無梁濯髮暘谷濱遠遊崑嶽傍登彼列仙岨採此秋蘭芳時路烏足爭太極可翱翔其三十六誰言萬事艱逍遙可終生臨堂翳華樹悠悠念無形彷徨思親友倏忽復至冥寄言東飛鳥可用慰我情其三十七嘉時在今辰零雨灑塵埃臨路望所思日夕復不來人情有感慨蕩漾焉能排揮涕懷哀傷辛酸誰語哉其三十八炎光延萬里洪川蕩湍瀨彎弓掛扶桑長劍倚天外泰山成砥礪黃河為裳帶視彼莊周子榮枯何足賴捐身棄中野烏鳶作患害豈若雄傑士功名從此大其三十九壯士何慷慨志欲威八荒驅車遠行役受命念自忘良弓挾烏號明甲有精光臨難不顧生身死魂飛揚豈為全軀士效命爭戰場忠為百世榮義使令名彰垂聲謝後世氣節故有常其四十混元生兩儀四象運衡璣曒日布炎精素月垂景輝晷度有昭回哀哉人命微飄若風塵逝忽若慶雲晞脩齡適余願光寵非己威安期步天路松子與世違焉得凌霄翼飄颻登雲湄嗟哉尼父志何為居九夷其四十一天網彌四野六翮掩不舒隨波紛綸客汎汎若浮鳧生命無期度朝夕有不虞列仙停脩齡養志在沖虛飄颻雲日間邈與世路殊榮名非己寶聲色焉足娛採藥無旋返神仙志不符逼此良可惑令我久躊躇其四十二王業須良輔建功俟英雄元凱康哉美多士頌聲隆陰陽有舛錯日月不常融天時有否泰人事多盈沖園綺遯南嶽伯陽隱西戎保身念道真寵耀焉足崇人誰不善始尠能剋厥終休哉上世士萬載垂清風其四十三鴻鵠相隨飛飛飛適荒裔雙翮臨長風須臾萬里逝朝餐琅玕實夕宿丹山際抗身青雲中網羅孰能制豈與鄉曲士攜手共言誓其四十四儔物終始殊修短各異方琅玕生高山芝英耀朱堂熒熒桃李花成蹊將夭傷焉敢希千術三春表微光自非凌風樹憔悴烏有常其四十五幽蘭不可佩朱草為誰榮脩竹隱山陰射干臨增城葛藟延幽谷緜緜瓜瓞生樂極消靈神哀深傷人情竟知憂無益豈若歸太清其四十六鷽鳩飛桑榆海鳥運天地豈不識宏大羽翼不相宜招搖安可翔不若棲樹枝下集蓬艾間上遊園圃籬但爾亦自足用子為追隨其四十七生命辰安在憂戚涕沾襟高鳥翔山岡燕雀棲下林青雲蔽前庭素琴悽我心崇山有鳴鶴豈可相追尋其四十八鳴鳩嬉庭樹焦明遊浮雲焉見孤翔鳥翩翩無匹群死生自然理消散何繽紛其四十九步遊三衢旁惆悵念所思豈為今朝見恍惚誠有之澤中生喬松萬世未可期高鳥摩天飛凌雲共遊嬉豈有孤行士垂涕悲故時其五十清露為凝霜華草成蒿萊誰云君子賢明達安可能乘雲招松喬呼噏永矣哉其五十一丹心失恩澤重德喪所宜善言焉可長慈惠未易施不見南飛燕羽翼正差池高子怨新詩三閭悼乖離何為混沌氏倏忽體貌隳其五十二十日出暘谷弭節馳萬里經天耀四海倏忽潛濛汜誰言焱炎久遊沒何行俟逝者豈長生亦去荊與杞千歲猶崇朝一餐聊自已是非得失間焉足相譏理計利知術窮哀情遽能止其五十三自然有成理生死道無常智巧萬端出大要不易方如何夸毗子作色懷驕腸乘軒驅良馬憑几向膏粱被服纖羅衣深榭設閑房不見日夕華翩翩飛路傍其五十四夸談快憤懣情慵發煩心西北登不周東南望鄧林曠野彌九州崇山抗高岑一餐度萬世千歲再浮沈誰云玉石同淚下不可禁其五十五人言願延年延年欲焉之黃鵠呼子安千秋未可期獨坐山嵓中惻愴懷所思王子一何好猗靡相攜持悅懌猶今辰計校在一時置此明朝事日夕將見欺其五十六貴賤在天命窮達自有時婉孌佞邪子隨利來相欺孤思損惠施但為讒夫蚩鶺鴒鳴雲中載飛靡所期焉知傾側士一旦不可持其五十七驚風振四野迴雲蔭堂隅床帷為誰設几杖為誰扶雖非明君子豈闇桑與榆世有此聾瞶芒芒將焉如翩翩從風飛悠悠去故居離麾玉山下遺棄毀與譽其五十八危冠切浮雲長劍出天外細故何足慮高度跨一世非子為我御逍遙遊荒裔顧謝西王母吾將從此逝豈與蓬戶士彈琴誦言誓其五十九河上有丈人緯蕭棄明珠甘彼藜藿食樂是蓬蒿廬豈效繽紛子良馬騁輕輿朝生衢路旁夕瘞橫術隅歡笑不終晏俛仰復欷歔鑒茲二三者憤懣從此舒其六十儒者通六藝立志不可干違禮不為動非法不肯言渴飲清泉流饑食并一簞歲時無以祀衣服常苦寒屣履詠南風縕袍笑華軒信道守詩書義不受一餐烈烈褒貶辭老氏用長歎其六十一少年學擊刺妙伎過曲城英風截雲霓超世發奇聲揮劍臨沙漠飲馬九野坰旗幟何翩翩但聞金鼓鳴軍旅令人悲烈烈有哀情念我平常時悔恨從此生其六十二平晝整衣冠思見客與賓賓客者誰子倏忽若飛塵裳衣佩雲氣言語究靈神須臾相背棄何時見斯人其六十三多慮令志散寂寞使心憂翱翔觀陂澤撫劍登輕舟但願長閒暇後歲復來遊其六十四朝出上東門遙望首陽基松柏鬱森沈鸝黃相與嬉逍遙九曲間徘徊欲何之念我平居時鬱然思妖姬其六十五王子十五年遊衍伊洛濱朱顏茂春華辯慧懷清真焉見浮丘公舉手謝時人輕蕩易恍惚飄颻棄其身飛飛鳴且翔揮翼且酸辛其六十六塞門不可出海水焉可浮朱明不相見奄昧獨無侯持瓜思東陵黃雀誠獨羞失勢在須臾帶劍上吾丘悼彼桑林子涕下自交流假乘汧渭間鞍馬去行遊其六十七洪生資制度被服正有常尊卑設次序事物齊紀綱容飾整顏色磬折執圭璋堂上置玄酒室中盛稻粱外厲貞素談戶內滅芬芳放口從衷出復說道義方委曲周旋儀姿態愁我腸其六十八北臨乾昧谿西行遊少任遙顧望天津駘蕩樂我心綺靡存亡門一遊不再尋儻遇晨風鳥飛駕出南林漭瀁瑤光中忽忽肆荒淫休息晏清都超世又誰禁其六十九人知結交易交友誠獨難險路多疑惑明珠未可干彼求饗太牢我欲并一餐損益生怨毒咄咄復何言其七十有悲則有情無悲亦無思苟非嬰網罟何必萬里畿翔風拂重霄慶雲招所晞灰心寄枯宅曷顧人間姿始得忘我難焉知嘿自遺其七十一木槿榮丘墓煌煌有光色白日頹林中翩翩零路側蟋蟀吟戶牖蟪蛄鳴荊棘蜉蝣玩三朝采采脩羽翼衣裳為誰施俛仰自收拭生命幾何時慷慨各努力其七十二脩塗馳軒車長川載輕舟性命豈自然勢路有所由高名令志惑重利使心憂親昵懷反側骨肉還相讎更希毀珠玉可用登遨遊其七十三橫術有奇士黃駿服其箱朝起瀛洲野日夕宿明光再撫四海外羽翼自飛揚去置世上事豈足愁我腸一去長離絕千歲復相望其七十四猗歟上世士恬淡志安貧季葉道陵遲馳騖紛垢塵甯子豈不類揚歌誰肯殉栖栖非我偶徨徨非己倫咄嗟榮辱事去來味道真道真信可娛清潔存精神巢由抗高節從此適河濱其七十五梁東有芳草一朝再三榮色容艷姿美光華耀傾城豈為明哲士妖蠱諂媚生輕薄在一時安知百世名路端便娟子但恐日月傾焉見冥靈木悠悠竟無形其七十六秋駕安可學東野窮路旁綸深魚淵潛矰設鳥高翔汎汎乘輕舟演漾靡所望吹噓誰以益江湖相捐忘都冶難為顏脩容是我常茲年在松喬恍惚誠未央其七十七咄嗟行至老僶俛常苦憂臨川羡洪波同始異支流百年何足言但苦怨與讎讎怨者誰子耳目還相羞聲色為胡越人情自逼遒招彼玄通士去來歸羡遊其七十八昔有神仙士乃處射山阿乘雲御飛龍噓噏嘰瓊華可聞不可見慷慨歎咨嗟自傷非儔類愁苦來相加下學而上達忽忽將如何其七十九林中有奇鳥自言是鳳凰清朝飲醴泉日夕棲山岡高鳴徹九州延頸望八荒適逢商風起羽翼自摧藏一去崑崙西何時復迴翔但恨處非位愴恨使心傷其八十出門望佳人佳人豈在茲三山招松喬萬世誰與期存亡有長短慷慨將焉知忽忽朝日隤行行將何之不見季秋草摧折在今時其八十一昔有神仙者羡門及松喬噏習九陽間升遐嘰雲霄人生樂長久百年自言遼白日隕隅谷一夕不再朝豈若遺世物登明遂飄颻其八十二墓前熒熒者木槿耀朱華榮好未終朝連飆隕其葩豈若西山草琅玕與丹禾垂影臨增城餘光照九阿寧微少年子日久難咨嗟歌二首採薪者歌日沒不周西月出丹淵中陽精蔽不見陰光代為雄亭亭在須臾厭厭將復隆離合雲霧兮往來如飄風富貴俯仰間貧賤何必終留侯起亡虜威武赫荒夷邵平封東陵兮一旦為布衣枝葉托根柢死生同盛衰得志從命升失勢與時隤寒暑代征邁兮變化更相推禍福無常主何憂身無歸推茲由斯理負薪又何哀大人先生歌天地解兮六合開星辰隕兮日月頹我騰而上將何懷
